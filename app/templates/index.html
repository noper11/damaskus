<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damaskus Upload</title>
    <!-- Bootstrap or custom styles are loaded from static folder -->
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="background"></div>

<nav>
    <div class="logo">
    <img src="{{ url_for('static', path='logo-damaskus.png') }}" style="width: 50px; height: auto;" alt="Logo Damaskus">
    </div>
    <ul>
        <li class="active">Upload</li>
        <li>Cloud Archive</li>
    </ul>
</nav>

<section class="hero">
    <h2>Backup to your Cloud and Airgapped Drive</h2>
    
      <div class="upload-card">
        <form id="uploadForm" method="POST" enctype="multipart/form-data" novalidate>
            <div class="drop-area" id="dropArea">
                <input type="file" name="file" id="fileInput" hidden accept=".pdf,.jpg,.jpeg,.png" required>
                <div class="upload-icon">☁</div>
                <h2>Drop your file here</h2>
                <p id="filename">or click to browse</p>
            </div>

            <div class="field">
                <label for="division">Choose Your Department</label>
                <select name="division" id="division" required>
                    <option value="" disabled selected> Choose Here... </option>
                    <option value="HR">HR</option>
                    <option value="HR">IT</option>
                    <option value="Finance">Finance</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Operations">Operation</option>
                </select>
            </div>

            <div class="buttons">
                <button type="submit" class="btn" id="submitCloud">
                    Upload to cloud only
                </button>
                <button type="submit" class="btn" id="submitAirgap">
                    Upload to cloud and airgapped drive
                </button>
            </div>
        </form>
    </div>
</section>

<script src="{{ url_for('static', path='script.js') }}"></script>

</body>
</html>
